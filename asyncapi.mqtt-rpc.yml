  schemas:
    deviceItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        groups:
          type: array
          items:
            type: number
    busItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        devices:
          type: array
          items:
            $ref: '#/components/schemas/deviceItem'
        commissioning:
          $ref: '#/components/schemas/commissioningState'
    commissioningDeviceSummary:
      type: object
      properties:
        short:
          type: integer
          minimum: 0
          maximum: 63
        random:
          type: integer
        dali2:
          type: boolean
      required:
        - short
        - random
        - dali2
    commissioningState:
      type: object
      properties:
        status:
          type: string
          enum:
            - idle
            - running
            - completed
            - failed
            - cancelled
        progress:
          type: integer
          minimum: 0
          maximum: 100
        stage:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
        devices:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/commissioningDeviceSummary'
        finished_at:
          type: string
          format: date-time
          nullable: true
          description: >-
            ISO-8601 UTC timestamp of the transition to a terminal status
            (completed/failed/cancelled); null while idle or running.
      required:
        - status
        - progress
        - stage
        - error
        - devices
        - finished_at
    gatewayItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        buses:
          $ref: '#/components/schemas/busItem'
    wbdaliEditorGetListPayload:
      type: object
      properties:
        id:
          type: number
        params:
          type: object
      required:
        - id
        - params
    wbdaliEditorGetListReplyPayload:
      type: object
      properties:
        id:
          type: number
        result:
          type: object
          properties:
            gateways:
              type: array
              items:
                $ref: '#/components/schemas/gatewayItem'
      required:
        - id
        - result
    wbdaliEditorGetGatewayPayload:
      type: object
      properties:
        id:
          type: number
        params:
          type: object
          properties:
            gatewayId:
              type: string
          required:
            - gatewayId
      required:
        - id
        - params
    wbdaliEditorGetGatewayReplyPayload:
      type: object
      properties:
        id:
          type: number
        result:
          type: object
          properties:
            config:
              type: object
            schema:
              type: object
          required:
            - config
            - schema
      required:
        - id
        - result
    wbdaliEditorSetGatewayPayload:
      type: object
      properties:
        id:
          type: number
        params:
          type: object
          properties:
            gatewayId:
              type: string
            config:
              type: object
          required:
            - gatewayId
            - config
      required:
        - id
        - params
    wbdaliEditorSetGatewayReplyPayload:
      type: object
      properties:
        id:
          type: number
        result:
          type: boolean
      required:
        - id
        - result
    wbdaliEditorGetBusPayload:
      type: object
      properties:
        id:
          type: number
        params:
          type: object
          properties:
            busId:
              type: string
          required:
            - busId
      required:
        - id
        - params
    wbdaliEditorGetBusReplyPayload:
      type: object
      properties:
        id:
          type: number
        result:
          type: object
          properties:
            schema:
              type: object
            busMonitor:
              type: string
          required:
            - schema
      required:
        - id
        - result
    wbdaliEditorSetBusPayload:
