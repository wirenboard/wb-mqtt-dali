          type: number
        params:
          type: object
          properties:
            busId:
              type: string
            config:
              type: object
          required:
            - busId
            - config
      required:
        - id
        - params
    wbdaliEditorSetBusReplyPayload:
      type: object
      properties:
        id:
          type: number
        result:
          type: boolean
      required:
        - id
        - result
    wbdaliEditorGetDevicePayload:
      type: object
      properties:
        id:
          type: number
        params:
          type: object
          properties:
            deviceId:
              type: string
          required:
            - deviceId
      required:
        - id
        - params
    wbdaliEditorGetDeviceReplyPayload:
      type: object
      properties:
        id:
          type: number
        result:
